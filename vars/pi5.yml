# Prowlarr indexer wishlist. `name` must match the exact entry in Prowlarr's
# /api/v1/indexer/schema response (the playbook task does case-sensitive match
# and silently skips on mismatch). Mechanically each entry is cloned from the
# schema, has overrides applied, POSTed with enable=false (skips Test), then
# PUT with enable=true&forceSave=true (PUT genuinely bypasses Test — POST does
# not, even with forceSave). cf_protected: true tags the indexer with the
# flaresolverr tag so Prowlarr routes its requests through FlareSolverr.
prowlarr_indexers:
  # Public, no auth
  - { name: "The Pirate Bay" }
  - { name: "YTS" }
  - { name: "Internet Archive" }
  # Public but CloudFlare-protected — route through FlareSolverr
  - { name: "1337x", cf_protected: true }
  - { name: "kickasstorrents.to", cf_protected: true }
  # Private — credentials from vault below
  - name: "RuTracker.org"
    fields:
      username: "{{ vault_rutracker_username }}"
      password: "{{ vault_rutracker_password }}"

