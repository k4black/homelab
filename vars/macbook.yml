# Profile-specific cask apps
homebrew_cask_apps_extra:
  personal:
    - tunnelblick
  work:
    - slack
homebrew_cask_apps: "{{ homebrew_cask_apps_common + homebrew_cask_apps_extra[macbook_profile] }}"
homebrew_installed_packages_common:
  # dev
  - git
  - git-lfs
  - sqlite
  - dockutil
  - gh
  - npm
  - ripgrep
  # languages
  - pyenv
  - go
  - rustup
  - openjdk
  # utils
  - grpcurl
  # ssh
  - ssh-copy-id
  - openssl
# Profile-specific formulae
homebrew_installed_packages_extra:
  personal: []
  work:
    - azure-cli
homebrew_installed_packages: "{{ homebrew_installed_packages_common + homebrew_installed_packages_extra[macbook_profile] }}"
# homebrew/cask-fonts was deprecated; font casks are now in homebrew/cask
homebrew_taps: []

# error when installed this way, include in homebrew_installed_packages
dockutil_install: true
configure_dock: true
dockitems_remove:
  - TV
  - Podcasts
  - "App Store"
  - Safari
  - Siri
  - FaceTime
  - Contacts
  - Maps
  - Messages
  - Podcasts
  - News
  - Music
  - Photos
  - Freeform
  - Keynote
  - Numbers
  - Pages
dockitems_persist:
  # NOTE: Finder is always first (pos 0)
  - name: "Launchpad"
    path: "/System/Applications/Launchpad.app"
    pos: 1
  - name: "Mail"
    path: "/Applications/Mail.app"
    pos: 2
  - name: "Calendar"
    path: "/Applications/Calendar.app"
    pos: 3
  - name: "Reminders"
    path: "/System/Applications/Reminders.app"
    pos: 4
  - name: "Notes"
    path: "/System/Applications/Notes.app"
    pos: 5
  - name: "System Settings"
    path: "/System/Applications/System Settings.app"
    pos: 6
  - name: "Zen Browser"
    path: "/Applications/Zen Browser.app"
    pos: 7
  - name: "Chromium"
    path: "/Applications/Chromium.app"
    pos: 8
  - name: "Telegram Desktop"
    path: "/Applications/Telegram Desktop.app"
    pos: 9
  - name: "Terminal"
    path: "/System/Applications/Utilities/Terminal.app"
    pos: 10
  - name: "Activity Monitor"
    path: "/System/Applications/Utilities/Activity Monitor.app"
    pos: 11


