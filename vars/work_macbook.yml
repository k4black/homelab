homebrew_taps:
  - homebrew/cask-fonts

# error when installed this way, include in homebrew_installed_packages
dockutil_install: true
configure_dock: true
dockitems_remove:
  - TV
  - Podcasts
  - "App Store"
  - Safari
  - Siri
  - FaceTime
  - Contacts
  - Maps
  - Messages
  - Podcasts
  - News
  - Music
  - Photos
  - Freeform
  - Keynote
  - Numbers
  - Pages
dockitems_persist:
  # NOTE: Finder is always first (pos 0)
  - name: "Launchpad"
    path: "/System/Applications/Launchpad.app"
    pos: 1
  - name: "Mail"
    path: "/Applications/Mail.app"
    pos: 2
  - name: "Calendar"
    path: "/Applications/Calendar.app"
    pos: 3
  - name: "Reminders"
    path: "/System/Applications/Reminders.app"
    pos: 4
  - name: "Notes"
    path: "/System/Applications/Notes.app"
    pos: 5
  - name: "Slack"
    path: "/Applications/Slack.app"
    pos: 6
  - name: "System Settings"
    path: "/System/Applications/System Settings.app"
    pos: 7
  - name: "Zen Browser"
    path: "/Applications/Zen Browser.app"
    pos: 8
  - name: "Chromium"
    path: "/Applications/Chromium.app"
    pos: 9
  - name: "Telegram Desktop"
    path: "/Applications/Telegram Desktop.app"
    pos: 10
  - name: "Terminal"
    path: "/System/Applications/Utilities/Terminal.app"
    pos: 11
  - name: "Activity Monitor"
    path: "/System/Applications/Utilities/Activity Monitor.app"
    pos: 12


