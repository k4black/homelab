---
- name: Setup ssh port
  hosts: pi5
  gather_facts: false

  vars_files:
    - vars/all.yml
    - vars/pi5.yml

  tasks:
    - name: SSH User Juggle
      ansible.builtin.import_tasks: tasks/sshd_login_user_juggling.yml
      when: testing is undefined or testing != 'true'
    - name: SSH Port Juggle
      ansible.builtin.import_tasks: tasks/sshd_port_juggling.yml
      when: testing is undefined or testing != 'true'
    - name: Read ssh_public_key from {{ ssh_public_key_file }}
      ansible.builtin.set_fact:
        ssh_public_key: "{{ lookup('file', ssh_public_key_file) }}"
      when: testing is undefined or testing != 'true'

- name: Setup local_ipv4
  hosts: pi5
  gather_facts: true

  tasks:
    # https://medium.com/opsops/ansible-default-ipv4-is-not-what-you-think-edb8ab154b10
    - name: Gather local_ipv4
      ansible.builtin.set_fact:
        local_ipv4: "{{ '127.0.0.1' if (testing is defined and testing == 'true') else (ansible_default_ipv4.address | default(ansible_all_ipv4_addresses[0])) }}"
      tags: [docker]
    - name: Debug local_ipv4
      ansible.builtin.debug:
        var: local_ipv4
      tags: [docker]

- name: Setup for testing
  hosts: pi5
  gather_facts: false
  become: true

  tasks:
    - name: For testing at github actions set username to "runner"
      ansible.builtin.set_fact:
        username: "runner"
      when: testing is defined and testing == 'true'

    - name: List all ports used
      block:
        - name: List all ports used
          ansible.builtin.command: netstat -tulpn
          become: true
          changed_when: false
          when: testing is defined and testing == 'true'
          register: netstat_output
        - name: Debug output ports
          ansible.builtin.debug:
            var: netstat_output.stdout_lines
          when: testing is defined and testing == 'true'

- name: Configure Pi5 personal server.
  hosts: pi5

  vars_files:
    - vars/all.yml
    - vars/pi5.yml

  pre_tasks:
    - name: Disable VPN if it is enabled
      ansible.builtin.shell: |
        sudo systemctl stop wg-quick@wg0
      become: true
      changed_when: false
      failed_when: false
      when: testing is undefined or testing != 'true'
    - name: Check if pi user exists
      ansible.builtin.command: id -u pi
      register: pi_user_check
      ignore_errors: true
      changed_when: false
    - name: Rename pi user and group if exists
      when: pi_user_check.rc == 0
      block:
        - name: Create new group with desired name
          ansible.builtin.group:
            name: "{{ username }}"
            gid: 1000
            state: present
        - name: Create new user with desired name
          ansible.builtin.user:
            name: "{{ username }}"
            uid: 1000
            group: "{{ username }}"
            home: "/home/{{ username }}"
            shell: /bin/bash
            state: present
        - name: Copy pi home directory to new user
          ansible.builtin.command: cp -a /home/pi/. /home/{{ username }}/
          failed_when: false
          changed_when: false
        - name: Set ownership of new home directory
          ansible.builtin.file:
            path: "/home/{{ username }}"
            owner: "{{ username }}"
            group: "{{ username }}"
            recurse: true
        - name: Remove pi user
          ansible.builtin.user:
            name: pi
            state: absent
            remove: true
        - name: Remove pi group
          ansible.builtin.group:
            name: pi
            state: absent
          failed_when: false

  roles:
    - role: geerlingguy.raspberry-pi  # set gpu_mem to 16 and 1200ma for usb
      vars:
        raspberry_pi_rc_local_options: []  # /etc/rc.local doesn't exist on bookworm+
      when: testing is undefined or testing != 'true'
      become: true

    - role: packages_install
      become: true

    - role: linux_server_setup
      vars:
        linux_server_setup_hostname: "{{ device_name }}"
        linux_server_setup_login_user: "{{ username }}"
        linux_server_setup_login_password: "{{ password }}"
        linux_server_setup_login_user_uid: 1000
        linux_server_setup_login_user_gid: 1000
        linux_server_setup_login_ssh_public_key: "{{ ssh_public_key }}"
        linux_server_setup_block_ports: true
        linux_server_setup_allow_subnets:
          - {subnet: "192.168.1.0/24", comment: "LAN full access"}
          - {subnet: "{{ vpn_network_subnet }}", comment: "VPN full access"}
        linux_server_setup_open_ports:
          - {port: 22, protocol: "tcp", comment: "default ssh"}
          - {port: "{{ ssh_port }}", protocol: "tcp", comment: "custom ssh"}
          - {port: 51820, protocol: "udp", comment: "wireguard"}
          - {port: 53, protocol: "udp", comment: "pihole dns"}
          - {port: 53, protocol: "tcp", comment: "pihole dns"}
          - {port: 80, protocol: "tcp", comment: "http"}
          - {port: 443, protocol: "tcp", comment: "https"}
          - {port: 51413, protocol: "tcp", comment: "transmission peer"}
          - {port: 51413, protocol: "udp", comment: "transmission peer"}

    - role: hifis.unattended_upgrades
      vars:
        unattended_automatic_reboot_time: 04:00  # noqa: var-naming[no-role-prefix]
        # apt-daily timer
        unattended_apt_daily_oncalendar: "*-*-* 01:00"  # noqa: var-naming[no-role-prefix]
        unattended_apt_daily_randomizeddelaysec: "60m"  # noqa: var-naming[no-role-prefix]
        # apt-daily-upgrade timer
        unattended_apt_daily_upgrade_oncalendar: "*-*-* 2:00"  # noqa: var-naming[no-role-prefix]
        unattended_apt_daily_upgrade_randomizeddelaysec: "60m"  # noqa: var-naming[no-role-prefix]
      become: true

    - role: geerlingguy.security
      security_ssh_port: "{{ ssh_port }}"
      security_ssh_permit_root_login: "no"
      become: true

    - role: geerlingguy.docker
      become: true

    - role: dotfiles
      tags: ["dotfiles"]
      vars:
        dotfiles_repo_url: "https://github.com/k4black/dotfiles.git"
        dotfiles_dest: "~/.dotfiles"
        dotfiles_symlinks:
          .zshrc: "~/.zshrc"
          .gitconfig: "~/.gitconfig"

    - role: zsh_setup
      vars:
        zsh_setup_set_default_shell: true
        zsh_setup_user: "{{ username }}"
      become: true

  tasks:
    # https://www.jeffgeerling.com/blog/2023/reducing-raspberry-pi-5s-power-consumption-140x
    - name: Lower power consumptions for pi5
      when: testing is undefined or testing != 'true'
      block:
        - name: Create temp boot.conf file
          ansible.builtin.template:
            src: files/pi5/boot.conf.j2
            dest: /tmp/boot.conf
            mode: 0755
            owner: root
            group: root
          become: true
        - name: Apply with rpi-eeprom-config
          ansible.builtin.command: rpi-eeprom-config --apply /tmp/boot.conf
          changed_when: false
          become: true

    - name: Setup .gitconfig.local
      ansible.builtin.template:
        src: files/.gitconfig.local.j2
        dest: ~/.gitconfig.local
        mode: 0600
        owner: "{{ ansible_user_id }}"

    - name: Setup external storage auto-mount
      when: testing is undefined or testing != 'true'
      block:
        - name: Add fstab entry for /mnt/storage (auto-mount when disk attached)
          ansible.posix.mount:
            path: /mnt/storage
            src: "UUID={{ storage_disk_uuid }}"
            fstype: ext4
            opts: defaults,nofail
            state: present
            dump: 0
            passno: 2
          become: true

        # Check current mount state BEFORE attempting `mount` — re-running
        # `mount /mnt/storage` when it's already mounted stacks a duplicate
        # bind mount on top (we hit this with the old /mnt/backups +
        # /mnt/timemachine entries; lsblk showed the partition mounted 3x
        # and umount had to be called per layer to drain).
        - name: Check if /mnt/storage is already mounted
          ansible.builtin.command: mountpoint -q /mnt/storage
          become: true
          register: storage_mountpoint
          failed_when: false
          changed_when: false

        - name: Mount /mnt/storage (only when not already mounted)
          ansible.builtin.command: mount /mnt/storage
          become: true
          when: storage_mountpoint.rc != 0
          register: mount_result
          changed_when: mount_result.rc == 0
          failed_when: false

        - name: Warn if /mnt/storage could not be mounted (disk not attached?)
          ansible.builtin.debug:
            msg: "WARNING: /mnt/storage is not mounted — external disk attached?"
          when:
            - storage_mountpoint.rc != 0
            - mount_result.rc | default(1) != 0

    # Pi 5 ships with memory cgroup disabled; docker can't report container memory
    # until it's enabled. Appends args to /boot/firmware/cmdline.txt (single-line file)
    # only when missing — requires a reboot to take effect.
    - name: Enable memory cgroup in kernel cmdline
      # /boot/firmware is FAT32 which rejects ':' / '@' in filenames, so Ansible's
      # timestamped backup file cannot be created — keep a copy on the ext4 root instead.
      block:
        - name: Snapshot current cmdline to /root before editing
          ansible.builtin.copy:
            src: /boot/firmware/cmdline.txt
            dest: /root/cmdline.txt.bak
            remote_src: true
            force: false
            mode: '0600'
          become: true
        - name: Append memory cgroup args if missing
          ansible.builtin.replace:
            path: /boot/firmware/cmdline.txt
            regexp: '^(?!.*cgroup_enable=memory)(.*)$'
            replace: '\1 cgroup_enable=memory cgroup_memory=1'
          become: true
          register: cmdline_change
      tags: [docker]

    - name: Notify if reboot required for memory cgroup
      ansible.builtin.debug:
        msg: "memory cgroup args appended to /boot/firmware/cmdline.txt — reboot pi5 to take effect ('docker stats' will report memory after reboot)."
      when: cmdline_change is defined and cmdline_change.changed
      tags: [docker]

    # Tailscale exit-node requires IP forwarding on the host.
    - name: Enable IP forwarding for Tailscale exit node
      ansible.posix.sysctl:
        name: "{{ item }}"
        value: "1"
        sysctl_set: true
        state: present
        reload: true
        sysctl_file: /etc/sysctl.d/99-tailscale.conf
      loop:
        - net.ipv4.ip_forward
        - net.ipv6.conf.all.forwarding
      become: true
      tags: [docker]

    - name: Get docker group GID for homepage
      ansible.builtin.command: getent group docker
      register: docker_group_info
      changed_when: false
      failed_when: false
      tags: [docker]
    - name: Set docker_gid fact
      ansible.builtin.set_fact:
        docker_gid: "{{ docker_group_info.stdout.split(':')[2] if docker_group_info.rc == 0 else '999' }}"
      tags: [docker]

    # Hermes' skills repo: k4black/agentic-tools (single source of truth for agent
    # skills). Cloned as a writable working copy that the agent reads
    # (skills.external_dirs -> agentic-tools/skills) AND git-commits/pushes back to
    # (PAT in the container env + ~/.gitconfig credential helper). Clone-if-missing
    # only (update: false) so Hermes' own local commits are never reset by a
    # redeploy. Public repo — no creds to clone; the PAT is only used for push.
    - name: Ensure Hermes data dir exists (parent of the skills clone)
      ansible.builtin.file:
        path: "{{ services_data_dir }}/hermes"
        state: directory
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: "0755"
      become: true
      tags: [docker]
    - name: Clone k4black/agentic-tools skills repo (clone-if-missing)
      ansible.builtin.git:
        repo: https://github.com/k4black/agentic-tools.git
        dest: "{{ services_data_dir }}/hermes/agentic-tools"
        version: main
        clone: true
        update: false
      become: true
      tags: [docker]
    - name: Own agentic-tools clone by the Hermes container user (uid/gid 1000)
      ansible.builtin.file:
        path: "{{ services_data_dir }}/hermes/agentic-tools"
        state: directory
        owner: "{{ username }}"
        group: "{{ username }}"
        recurse: true
      become: true
      tags: [docker]

    # headless-anki: the published arm64 image is glibc-broken, so build our own
    # from the upstream clone (for its data/ profile + startup.sh) with a patched,
    # arch-aware Dockerfile. `docker compose up --build` (in containers_setup)
    # builds it; layers cache so only the first deploy is slow.
    - name: Clone ThisIsntTheWay/headless-anki build context
      ansible.builtin.git:
        repo: https://github.com/ThisIsntTheWay/headless-anki.git
        dest: "{{ anki_build_dir }}"
        version: main
        clone: true
        update: true
      become: true
      tags: [docker]
    - name: Drop in the patched arm64 Dockerfile (Dockerfile.pi5)
      ansible.builtin.copy:
        src: files/pi5/anki.Dockerfile
        dest: "{{ anki_build_dir }}/Dockerfile.pi5"
        mode: "0644"
      become: true
      tags: [docker]

    - name: Copy docker configs and run containers
      ansible.builtin.include_role:
        name: containers_setup
      tags: [docker]
      vars:
        containers_setup_user: "{{ username }}"
        containers_setup_configs_dir: "{{ services_configs_dir }}"
        containers_setup_data_dir: "{{ services_data_dir }}"
        containers_setup_docker_compose_template: "files/pi5/docker-compose.yml.j2"
        containers_setup_make_dirs:
          - "{{ services_data_dir }}/traefik-letsencrypt"
          - "{{ services_configs_dir }}/home-assistant-config"
          - "{{ services_configs_dir }}/homepage-config"
          - "{{ services_data_dir }}/homepage-logs"
          - "{{ services_configs_dir }}/pihole"
          - "{{ services_configs_dir }}/pihole-dnsmasq.d"
          - "{{ services_configs_dir }}/transmission-config"
          - "{{ services_data_dir }}/myspeed"
          - "{{ services_configs_dir }}/netdata-config"
          - "{{ services_configs_dir }}/netdata-config/go.d"
          - "{{ services_data_dir }}/tailscale"
          - "{{ services_data_dir }}/filebrowser/config"
          - "{{ services_data_dir }}/filebrowser/database"
          - "{{ services_data_dir }}/jellyfin/config"
          - "{{ services_data_dir }}/jellyfin/cache"
          - "{{ services_data_dir }}/prowlarr/config"
          - "{{ services_data_dir }}/radarr/config"
          - "{{ services_data_dir }}/sonarr/config"
          # Hermes HERMES_HOME (/opt/data) — config.yaml + agent state/memory.
          - "{{ services_data_dir }}/hermes"
          # Canonical TRaSH layout on the external storage disk. Mounted at
          # /mnt/storage and bind-mounted into Radarr/Sonarr/Transmission as
          # /data; into Jellyfin as /media (read-only). Subdirs created here so
          # containers_setup_user owns them (1000:1000). /backups is a sibling
          # for general personal backups (not bind-mounted into *arr containers).
          - "/mnt/storage/backups"
          - "/mnt/storage/torrents"
          - "/mnt/storage/torrents/movies"
          - "/mnt/storage/torrents/tv"
          - "/mnt/storage/torrents/.incomplete"
          - "/mnt/storage/media"
          - "/mnt/storage/media/books"
          - "/mnt/storage/media/movies"
          - "/mnt/storage/media/tv"
        containers_setup_touch_files: []
        containers_setup_config_templates:
          files/pi5/transmission-settings.json.j2: "transmission-config/settings.json"
          files/pi5/server-wg0.conf.j2: "server-wg0.conf"  # TODO: fix permissions
          files/pi5/home-assistant-config.yml.j2: "home-assistant-config/configuration.yaml"
          files/pi5/pihole-02-custom-dns.conf.j2: "pihole-dnsmasq.d/02-custom-dns.conf"
          files/pi5/pihole-adlists.list: "pihole/adlists.list"
          files/pi5/pihole-custom.list.j2: "pihole/custom.list"
          files/pi5/traefik-config.yml.j2: "traefik-config.yml"
          files/pi5/traefik-dynamic.yml.j2: "traefik-dynamic.yml"
          files/pi5/homepage-docker.yaml.j2: "homepage-config/docker.yaml"
          files/pi5/homepage-settings.yaml.j2: "homepage-config/settings.yaml"
          files/pi5/homepage-services.yaml.j2: "homepage-config/services.yaml"
          files/pi5/homepage-widgets.yaml.j2: "homepage-config/widgets.yaml"
          files/pi5/homepage-bookmarks.yaml.j2: "homepage-config/bookmarks.yaml"
          files/pi5/homepage-custom.js.j2: "homepage-config/custom.js"
          files/pi5/homepage-custom.css.j2: "homepage-config/custom.css"
          files/pi5/netdata.conf.j2: "netdata-config/netdata.conf"
          files/pi5/netdata-stream.conf.j2: "netdata-config/stream.conf"
          files/pi5/netdata-pihole.conf: "netdata-config/go.d/pihole.conf"
          # Rendered into Hermes' HERMES_HOME (data dir, not configs dir) so it
          # sits at /opt/data/config.yaml inside the container. Non-secret only.
          files/pi5/hermes-config.yaml.j2: "../data/hermes/config.yaml"
          # Git identity + PAT credential helper for the dotfiles skills repo.
          files/pi5/hermes-gitconfig.j2: "../data/hermes/.gitconfig"

    - name: Verify Tailscale connection
      tags: [docker]
      block:
        - name: Wait for Tailscale to connect
          ansible.builtin.command: docker exec tailscale tailscale status --json
          register: tailscale_status
          retries: 6
          delay: 10
          until: tailscale_status.rc == 0
          changed_when: false
          failed_when: false
        - name: Fail if Tailscale auth key is expired or invalid
          ansible.builtin.fail:
            msg: >
              Tailscale failed to connect — auth key may be expired (90-day limit).
              Regenerate at https://login.tailscale.com/admin/settings/keys
              and update tailscale_authkey in vars/all.yml
          when: tailscale_status.rc != 0

    # Jellyfin's first-run wizard cannot be skipped via env vars; the /Startup/*
    # endpoints are unauthenticated only until /Startup/Complete is called, so
    # drive them once on fresh installs. Gated on StartupWizardCompleted so
    # re-running the playbook is a no-op. Login cannot be fully disabled in
    # Jellyfin 10.11; falls back to admin/admin if jellyfin_admin_password
    # is not set in vault.
    - name: Initialize Jellyfin (first-run wizard via API)
      tags: [docker]
      vars:
        jf_url: "http://127.0.0.1:8096"
        jf_admin_user: admin
        jf_admin_password: "{{ jellyfin_admin_password | default('admin') }}"
      block:
        - name: Wait for Jellyfin to be reachable
          ansible.builtin.uri:
            url: "{{ jf_url }}/System/Info/Public"
            return_content: true
          register: jf_info
          retries: 30
          delay: 5
          until: jf_info.status == 200

        - name: Drive Jellyfin startup wizard (idempotent — skipped if already completed)
          # StartupWizardCompleted is absent from /System/Info/Public until the
          # wizard finishes, so default to false to fire the block on fresh installs.
          when: not (jf_info.json.StartupWizardCompleted | default(false))
          block:
            - name: Set locale/language (retry until Startup endpoint is ready)
              # /System/Info/Public answers before Jellyfin's Startup/* routes
              # finish initialising, so the first call here can hit 503 with a
              # Retry-After header — retry until we get a 2xx.
              ansible.builtin.uri:
                url: "{{ jf_url }}/Startup/Configuration"
                method: POST
                body_format: json
                body:
                  UICulture: "en-US"
                  MetadataCountryCode: "US"
                  PreferredMetadataLanguage: "en"
                status_code: [200, 204, 503]
              register: jf_locale
              retries: 30
              delay: 5
              until: jf_locale.status in [200, 204]

            - name: Trigger Jellyfin default-user lazy-creation
              # Jellyfin doesn't create the default admin user until something
              # queries /Startup/User — POSTing without this GET hits .First()
              # on an empty collection and throws 500 "Sequence contains no
              # elements" (logged in 10.11.8). The GET response is discarded;
              # only the side effect (user "MyJellyfinUser" created) matters.
              ansible.builtin.uri:
                url: "{{ jf_url }}/Startup/User"
                method: GET
                status_code: 200

            - name: Create admin user
              ansible.builtin.uri:
                url: "{{ jf_url }}/Startup/User"
                method: POST
                body_format: json
                body:
                  Name: "{{ jf_admin_user }}"
                  Password: "{{ jf_admin_password }}"
                status_code: [200, 204]

            - name: Disable remote access (rely on LAN/Tailscale/VPN gating)
              ansible.builtin.uri:
                url: "{{ jf_url }}/Startup/RemoteAccess"
                method: POST
                body_format: json
                body:
                  EnableRemoteAccess: false
                  EnableAutomaticPortMapping: false
                status_code: [200, 204]

            - name: Complete startup wizard
              ansible.builtin.uri:
                url: "{{ jf_url }}/Startup/Complete"
                method: POST
                status_code: [200, 204]

        # Library registration runs on EVERY playbook execution — gated per-library
        # by GET /Library/VirtualFolders so existing libraries are skipped silently.
        # Pulled out of the wizard block so existing installs (where StartupWizard-
        # Completed is true) also get any new libraries added — e.g. when the
        # canonical /media/{movies,tv} layout replaces an earlier single /media.
        - name: Authenticate as admin (token for library management)
          ansible.builtin.uri:
            url: "{{ jf_url }}/Users/AuthenticateByName"
            method: POST
            headers:
              X-Emby-Authorization: 'MediaBrowser Client="ansible", Device="ansible", DeviceId="ansible", Version="1"'
            body_format: json
            body:
              Username: "{{ jf_admin_user }}"
              Pw: "{{ jf_admin_password }}"
            status_code: 200
          register: jf_auth

        - name: List existing Jellyfin libraries
          ansible.builtin.uri:
            url: "{{ jf_url }}/Library/VirtualFolders"
            headers:
              X-Emby-Token: "{{ jf_auth.json.AccessToken }}"
          register: jf_libs

        - name: Add missing Jellyfin libraries (Movies, TV Shows, Books)
          ansible.builtin.uri:
            url: "{{ jf_url }}/Library/VirtualFolders?name={{ item.name | urlencode }}&collectionType={{ item.collection }}&refreshLibrary=true"
            method: POST
            headers:
              X-Emby-Token: "{{ jf_auth.json.AccessToken }}"
            body_format: json
            body:
              LibraryOptions:
                PathInfos:
                  - Path: "{{ item.path }}"
            status_code: [200, 204]
          loop:
            - {name: "Movies",    collection: "movies",     path: "/media/movies"}
            - {name: "TV Shows",  collection: "tvshows",    path: "/media/tv"}
            - {name: "Books",     collection: "books",      path: "/media/books"}
          when: (jf_libs.json | selectattr('Name', 'equalto', item.name) | list | length) == 0

    # Prowlarr/Radarr/Sonarr don't accept auth via env vars — auth lives in
    # /config/config.xml. Patch in-place after the apps create their initial
    # config, then restart so the change takes effect. DisabledForLocalAddresses
    # lets RFC1918/Docker-bridge clients in without a login; external clients
    # (Tailscale/VPN-only here anyway) get the Forms login screen.
    - name: Configure *arr auth (no auth for local addresses)
      tags: [docker]
      become: true
      block:
        - name: Wait for {{ item }} config.xml to be created
          ansible.builtin.wait_for:
            path: "{{ services_data_dir }}/{{ item }}/config/config.xml"
            timeout: 120
          loop:
            - prowlarr
            - radarr
            - sonarr

        # Using ansible.builtin.replace (regex) instead of community.general.xml
        # to avoid the python3-lxml dependency on the remote. *arr config.xml is
        # a flat one-element-per-line format, so a tight regex is reliable.
        - name: Set {{ item }} AuthenticationMethod = Forms
          ansible.builtin.replace:
            path: "{{ services_data_dir }}/{{ item }}/config/config.xml"
            regexp: '<AuthenticationMethod>[^<]*</AuthenticationMethod>'
            replace: '<AuthenticationMethod>Forms</AuthenticationMethod>'
          loop:
            - prowlarr
            - radarr
            - sonarr
          register: arr_auth_method

        - name: Set {{ item }} AuthenticationRequired = DisabledForLocalAddresses
          ansible.builtin.replace:
            path: "{{ services_data_dir }}/{{ item }}/config/config.xml"
            regexp: '<AuthenticationRequired>[^<]*</AuthenticationRequired>'
            replace: '<AuthenticationRequired>DisabledForLocalAddresses</AuthenticationRequired>'
          loop:
            - prowlarr
            - radarr
            - sonarr
          register: arr_auth_required

        - name: Restart *arr containers if auth config changed
          ansible.builtin.command: docker restart {{ item }}
          loop:
            - prowlarr
            - radarr
            - sonarr
          loop_control:
            index_var: arr_idx
          when: arr_auth_method.results[arr_idx].changed or arr_auth_required.results[arr_idx].changed
          changed_when: true

    # Wire up Transmission as Radarr/Sonarr download client (+ root folders) and
    # register Radarr/Sonarr as Prowlarr Applications so indexers auto-sync.
    # Indexers themselves are NOT seeded — see comments in the included tasks.
    # include_tasks (not import_tasks) so the included tasks see vars; apply:
    # propagates the `docker` tag so `--tags docker` runs included tasks too.
    - name: Auto-configure *arr stack (download client + root folders + Prowlarr apps)
      tags: [docker]
      vars:
        prowlarr_url: "http://127.0.0.1:9696"
        radarr_url: "http://127.0.0.1:7878"
        sonarr_url: "http://127.0.0.1:8989"
        flaresolverr_url: "http://127.0.0.1:8191"
      ansible.builtin.include_tasks:
        file: tasks/configure_arr_stack.yml
        apply:
          tags: [docker]

